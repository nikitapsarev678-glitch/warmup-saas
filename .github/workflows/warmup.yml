name: Warmup Runner

on:
  workflow_dispatch:
    inputs:
      campaign_id:
        description: 'Campaign ID'
        required: false
        type: string
      action:
        description: 'Action (run_campaign | poll)'
        required: false
        default: 'poll'
        type: string
      account_id:
        description: 'Telegram account ID'
        required: false
        type: string
      user_id:
        description: 'User ID for direct account actions'
        required: false
        type: string

  schedule:
    - cron: '0 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r runner/requirements.txt
      - name: Run warmup
        run: |
          if [ "${{ inputs.action }}" = "send_code" ] || [ "${{ inputs.action }}" = "confirm_code" ]; then
            python runner/main.py --action="${{ inputs.action }}" --account-id="${{ inputs.account_id }}" --user-id="${{ inputs.user_id }}"
          elif [ "${{ inputs.action }}" = "poll" ] || [ "${{ inputs.campaign_id }}" = "" ]; then
            python runner/main.py --poll
          else
            python runner/main.py --campaign-id=${{ inputs.campaign_id }}
          fi
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_USE_PAID_MODEL: ${{ vars.AI_USE_PAID_MODEL || '0' }}
